services:
  web:
    image: jitsi/web:${JITSI_IMAGE_VERSION:-stable-10741}
    restart: ${RESTART_POLICY:-unless-stopped}
    volumes:
      - ${CONFIG}/web:/config:Z
      - ${CONFIG}/web/crontabs:/var/spool/cron/crontabs:Z
      - ${CONFIG}/transcripts:/usr/share/jitsi-meet/transcripts:Z
      - ${CONFIG}/web/load-test:/usr/share/jitsi-meet/load-test:Z
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${CUSTOMERNAME}-jitsi.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${CUSTOMERNAME}-jitsi.entrypoints=websecure"
      - "traefik.http.routers.${CUSTOMERNAME}-jitsi.tls.certresolver=letsencrypt"
      - "traefik.http.services.${CUSTOMERNAME}-jitsi.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy-shared"
      - "komodo.skip=true"
    environment:
      - PUBLIC_URL=https://${DOMAIN}
      - XMPP_DOMAIN=${XMPP_DOMAIN}
      - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN}
      - XMPP_GUEST_DOMAIN=${XMPP_GUEST_DOMAIN}
      - XMPP_MUC_DOMAIN=${XMPP_MUC_DOMAIN}
      - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN}
      - XMPP_HIDDEN_DOMAIN=${XMPP_HIDDEN_DOMAIN}
      - XMPP_RECORDER_DOMAIN=${XMPP_RECORDER_DOMAIN}
      - XMPP_SERVER=${XMPP_SERVER}
      - XMPP_PORT=5222
      - PROSODY_HTTP_PORT=5280
      - JVB_PORT=${JVB_PORT}
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - JVB_BREWERY_MUC=jvbbrewery
      - JVB_STUN_SERVERS=${JVB_STUN_SERVERS}
      - JVB_ADVERTISE_IPS=${HOST_IPv4}
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET}
      - PROSODY_ADMINS=${PROSODY_ADMINS}
      - JICOFO_AUTH_USER=focus
      - JIBRI_XMPP_USER=jibri
      - JIBRI_XMPP_PASSWORD=${JIBRI_XMPP_PASSWORD}
      - JIBRI_RECORDER_USER=recorder
      - JIBRI_RECORDER_PASSWORD=${JIBRI_RECORDER_PASSWORD}
      - ENABLE_AUTH=0
      - ENABLE_GUESTS=1
      - AUTH_TYPE=internal
      - STUN_HOST=stun.l.google.com
      - STUN_PORT=19302
      - TURN_HOST=${HOST_IPv4}
      - TURN_PORT=3478
      - TURN_TRANSPORT=udp
      - TURN_USERNAME=${TURN_USERNAME}
      - TURN_PASSWORD=${TURN_PASSWORD}
      - TURNS_HOST=${HOST_IPv4}
      - TURNS_PORT=5349
      - ENABLE_RECORDING=0
      - ENABLE_LIVESTREAMING=0
      - ENABLE_TRANSCRIPTIONS=0
      - ENABLE_SUBDOMAINS=0
      - ENABLE_LOBBY=1
      - ENABLE_BREAKOUT_ROOMS=1
      - ENABLE_POLLS=1
      - ENABLE_FILE_RECORDING_SHARING=0
      - ENABLE_OCTO=0
      - RESOLUTION=720
      - ENABLE_SIMULCAST=1
      - ENABLE_STEREO=0
      - ENABLE_NO_AUDIO_DETECTION=1
      - TZ=Europe/Berlin
    networks:
      - jitsi_${CUSTOMERNAME}
      - proxy-shared
    depends_on:
      - jvb

  prosody:
    image: jitsi/prosody:${JITSI_IMAGE_VERSION:-stable-10741}
    restart: ${RESTART_POLICY:-unless-stopped}
    expose:
      - '5222'
      - '5269'
      - '5347'
      - '5280'
    volumes:
      - ${CONFIG}/prosody/config:/config:Z
      - ${CONFIG}/prosody/prosody-plugins-custom:/prosody-plugins-custom:Z
    environment:
      - XMPP_DOMAIN=${XMPP_DOMAIN}
      - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN}
      - XMPP_GUEST_DOMAIN=${XMPP_GUEST_DOMAIN}
      - XMPP_MUC_DOMAIN=${XMPP_MUC_DOMAIN}
      - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN}
      - XMPP_HIDDEN_DOMAIN=${XMPP_HIDDEN_DOMAIN}
      - XMPP_RECORDER_DOMAIN=${XMPP_RECORDER_DOMAIN}
      - XMPP_PORT=5222
      - PROSODY_HTTP_PORT=5280
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET}
      - PROSODY_ADMINS=${PROSODY_ADMINS}
      - JIBRI_XMPP_USER=jibri
      - JIBRI_XMPP_PASSWORD=${JIBRI_XMPP_PASSWORD}
      - JIBRI_RECORDER_USER=recorder
      - JIBRI_RECORDER_PASSWORD=${JIBRI_RECORDER_PASSWORD}
      - ENABLE_AUTH=0
      - ENABLE_GUESTS=1
      - AUTH_TYPE=internal
      - TZ=Europe/Berlin
    networks:
      - jitsi_${CUSTOMERNAME}
    labels:
      komodo.skip: "true"

  jicofo:
    image: jitsi/jicofo:${JITSI_IMAGE_VERSION:-stable-10741}
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - '127.0.0.1:8888:8888'
    volumes:
      - ${CONFIG}/jicofo:/config:Z
    environment:
      - XMPP_DOMAIN=${XMPP_DOMAIN}
      - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN}
      - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN}
      - XMPP_MUC_DOMAIN=${XMPP_MUC_DOMAIN}
      - XMPP_SERVER=${XMPP_SERVER}
      - XMPP_PORT=5222
      - JVB_BREWERY_MUC=jvbbrewery
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - JVB_XMPP_PORT=5222
      - JVB_XMPP_SERVER=${XMPP_SERVER}
      - JVB_XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN}
      - JVB_XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN}
      - ENABLE_AUTH=0
      - TZ=Europe/Berlin
    networks:
      - jitsi_${CUSTOMERNAME}
    depends_on:
      - prosody
    labels:
      komodo.skip: "true"

  jvb:
    image: jitsi/jvb:${JITSI_IMAGE_VERSION:-stable-10741}
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - '${JVB_PORT}:${JVB_PORT}/udp'
      - '127.0.0.1:8080:8080'
    volumes:
      - ${CONFIG}/jvb:/config:Z
    environment:
      - XMPP_DOMAIN=${XMPP_DOMAIN}
      - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN}
      - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN}
      - XMPP_SERVER=${XMPP_SERVER}
      - XMPP_PORT=5222
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - JVB_BREWERY_MUC=jvbbrewery
      - JVB_PORT=${JVB_PORT}
      - JVB_STUN_SERVERS=${JVB_STUN_SERVERS}
      - JVB_ADVERTISE_IPS=${HOST_IPv4}
      - PUBLIC_URL=https://${DOMAIN}
      - TZ=Europe/Berlin
    networks:
      - jitsi_${CUSTOMERNAME}
    depends_on:
      - prosody
    labels:
      komodo.skip: "true"

networks:
  jitsi_${CUSTOMERNAME}:
    driver: overlay
    attachable: true
  proxy-shared:
    external: true
    name: proxy-shared
