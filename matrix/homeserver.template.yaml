server_name: "!!DOMAIN!!"
pid_file: /data/homeserver.pid

listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: true
    resources:
      - names: [client, federation]
        compress: false

database:
  name: psycopg2
  args:
    user: synapse
    password: !!POSTGRES_PASSWORD!!
    database: synapse
    host: postgres
    cp_min: 5
    cp_max: 10
  allow_unsafe_locale: true

redis:
  enabled: true
  host: redis
  port: 6379

enable_registration: false
suppress_key_server_warning: true
report_stats: true
no_tls: true

macaroon_secret_key: !!MACAROON_SECRET_KEY!!

trusted_key_servers:
  - server_name: "matrix.org"
    verify_keys:
      "ed25519:auto": "Noi6WqcDj0QmPxCNQqgezwTlBKrfqehY1u2FyWP0uIk"

log_config: "/data/!!DOMAIN!!.log.config"
media_store_path: "/data/media_store"
